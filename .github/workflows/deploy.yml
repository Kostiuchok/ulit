name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d ' \n\r\t' | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "|1|ano1+rHtFVv9g5TfVIKIOCIbG0k=|l9QN9/SabWN4kvBKi4PP15UZKRY= ssh-rsa " >> ~/.ssh/known_hosts
          echo "|1|86yw1G0dVBodWoL32+8XPcPQwDQ=|4033hKbN+QouwI43DWrMhEV8W3o= ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBRqoECRSm3VdABQW9IwT3O1wVj6swqwSFpe2jg7fW0J" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: ssh -i ~/.ssh/deploy_key -p 22 root@${{ vars.SSH_HOST }} "bash /opt/knyha-platform/infra/scripts/deploy.sh"
        timeout-minutes: 10
